name: Release Candidate
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/reviewer-ui/package-lock.json
      - run: python -m pip install uv==0.11.29
      - run: uv sync --frozen --extra dev
      - run: npm --prefix apps/reviewer-ui ci
      - run: make check docs-build benchmark-smoke sbom security-scan package-build package-verify
      - name: Build and smoke-test Compose stack
        run: |
          docker compose config
          docker compose build --pull
          docker compose up -d || { docker compose logs; exit 1; }
          for i in {1..30}; do curl -fsS http://localhost:8000/readyz && break; sleep 2; done
          curl -fsS http://localhost:8000/healthz || { docker compose logs; exit 1; }
          docker compose down -v
      - name: Build and push API image by digest
        env:
          REGISTRY: ghcr.io
          IMAGE: ghcr.io/${{ github.repository }}/api
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u "${{ github.actor }}" --password-stdin
          docker build -f infra/docker/api.Dockerfile -t "$IMAGE:${{ github.ref_name }}" .
          docker push "$IMAGE:${{ github.ref_name }}"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE:${{ github.ref_name }}")
          echo "IMAGE_DIGEST=$DIGEST" >> "$GITHUB_ENV"
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_DIGEST }}
          format: cyclonedx
          output: release/sbom/api-image.cdx.json
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE_DIGEST }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign and attest image
        run: |
          cosign sign --yes "$IMAGE_DIGEST"
          cosign attest --yes --predicate release/sbom/api-image.cdx.json --type cyclonedx "$IMAGE_DIGEST"
          cosign verify "$IMAGE_DIGEST"
      - run: uv run python scripts/verify_release.py
      - run: make release-checksums
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            release/packages/* \
            release/sbom/* \
            release/security/* \
            release/SHA256SUMS \
            docs/assets/eduwork-databridge-walkthrough.mp4 \
            --verify-tag \
            --generate-notes
