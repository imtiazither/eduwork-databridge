name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/pages.yml"
      - "apps/reviewer-ui/**"
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/reviewer-ui/package-lock.json
      - run: python -m pip install uv==0.11.29
      - run: uv sync --frozen --extra dev
      - run: npm --prefix apps/reviewer-ui ci
      - run: npm --prefix apps/reviewer-ui test -- --run
      - run: npm --prefix apps/reviewer-ui run build:pages
      - run: uv run mkdocs build --strict --site-dir apps/reviewer-ui/dist/docs
      - name: Finish the static artifact
        run: |
          cp apps/reviewer-ui/dist/index.html apps/reviewer-ui/dist/404.html
          touch apps/reviewer-ui/dist/.nojekyll
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: apps/reviewer-ui/dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
