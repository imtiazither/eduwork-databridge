<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc"><title id="title">Synthetic field lineage view</title><desc id="desc">A lineage graph from raw HRIS snapshot through mapping and governed mart to a masked export.</desc><rect width="1440" height="900" fill="#f6f8fa"/><rect width="1440" height="82" fill="#0a2038"/><text x="64" y="52" font-family="Arial,sans-serif" font-size="25" font-weight="700" fill="#fff">EduWork DataBridge · lineage</text><text x="1210" y="50" font-family="Arial,sans-serif" font-size="16" fill="#a9c4d8">SYNTHETIC</text><text x="64" y="146" font-family="Arial,sans-serif" font-size="34" font-weight="700" fill="#10233a">Trace: masked person identifier in training export</text><text x="64" y="181" font-family="Arial,sans-serif" font-size="17" fill="#5a6c7d">Every edge records a versioned rule, checksum, or field mapping.</text><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#4f7f9e"/></marker></defs><g font-family="Arial,sans-serif"><path d="M306 350 H430" stroke="#4f7f9e" stroke-width="4" marker-end="url(#arrow)"/><path d="M690 350 H814" stroke="#4f7f9e" stroke-width="4" marker-end="url(#arrow)"/><path d="M1068 350 H1190" stroke="#4f7f9e" stroke-width="4" marker-end="url(#arrow)"/><rect x="70" y="270" width="236" height="160" rx="18" fill="#fff" stroke="#b9ccd9" stroke-width="2"/><text x="94" y="310" font-size="14" font-weight="700" fill="#00769b">RAW DATASET</text><text x="94" y="350" font-size="21" font-weight="700" fill="#10233a">HRIS snapshot</text><text x="94" y="382" font-size="14" fill="#5a6c7d">SHA-256: 48c869…</text><text x="94" y="406" font-size="14" fill="#5a6c7d">field: employee_id</text><rect x="430" y="270" width="260" height="160" rx="18" fill="#e8f4f8" stroke="#66aec4" stroke-width="2"/><text x="454" y="310" font-size="14" font-weight="700" fill="#00769b">VERSIONED MAPPING</text><text x="454" y="350" font-size="21" font-weight="700" fill="#10233a">hris_person_v1</text><text x="454" y="382" font-size="14" fill="#5a6c7d">trim → employee_id</text><text x="454" y="406" font-size="14" fill="#5a6c7d">rule sequence: 2</text><rect x="814" y="270" width="254" height="160" rx="18" fill="#fff" stroke="#b9ccd9" stroke-width="2"/><text x="838" y="310" font-size="14" font-weight="700" fill="#00769b">GOVERNED MART</text><text x="838" y="350" font-size="21" font-weight="700" fill="#10233a">training participation</text><text x="838" y="382" font-size="14" fill="#5a6c7d">field documented</text><text x="838" y="406" font-size="14" fill="#5a6c7d">lineage preserved</text><rect x="1190" y="270" width="190" height="160" rx="18" fill="#0f2b47"/><text x="1214" y="310" font-size="14" font-weight="700" fill="#62d0e8">MASKED EXPORT</text><text x="1214" y="350" font-size="21" font-weight="700" fill="#fff">CSV v1</text><text x="1214" y="382" font-size="14" fill="#b9cfdd">sha256:2b7…</text><text x="1214" y="406" font-size="14" fill="#b9cfdd">permission gated</text><rect x="70" y="526" width="1310" height="220" rx="18" fill="#fff" stroke="#d8e2ea"/><text x="98" y="570" font-size="20" font-weight="700" fill="#10233a">Evidence shown to the reviewer</text><text x="98" y="618" font-size="16" fill="#40566b">Source snapshot ID and checksum</text><text x="490" y="618" font-size="16" fill="#40566b">Mapping ID, version, sequence, source and target</text><text x="1000" y="618" font-size="16" fill="#40566b">Mart and export IDs</text><text x="98" y="666" font-size="16" fill="#40566b">Validation and quarantine history</text><text x="490" y="666" font-size="16" fill="#40566b">Authorization and audit actor</text><text x="1000" y="666" font-size="16" fill="#40566b">Retention period</text><text x="98" y="714" font-size="14" font-weight="700" fill="#b35a00">Synthetic illustration—no company data or adoption claim.</text></g></svg>