schema_version: "1.0"
mart_id: credential_status_v1
version: "1.0"
entity: credential_status
fields: [assessment_person_id, credential_code, awarded_at, expires_at, status]
definitions:
  assessment_person_id: Source-scoped person identifier
  credential_code: Credential definition code
  awarded_at: Credential award timestamp
  expires_at: Credential expiration timestamp when applicable
  status: Source credential status
  current_status: Derived active or expired status as of the build time
